# `cargo gate` is THE gate (contract §9, ADR 0009): one command, single
# definition of "green". `cargo xtask setup` is one-command provisioning (I9).
[alias]
xtask = "run --quiet --package xtask --"
gate = "run --quiet --package xtask -- gate"
# The 3D terrain workbench (issue #8, ADR 0020): `cargo workbench` opens the
# window; `cargo capture [PATH]` renders it headlessly to a PNG for /verify.
workbench = "run --quiet --package providence -- workbench"
capture = "run --quiet --package providence -- capture"
